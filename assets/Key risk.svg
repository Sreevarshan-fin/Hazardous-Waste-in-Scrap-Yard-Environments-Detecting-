<svg width="100%" height="500" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Card 1 -->
  <rect x="20" y="20" width="450" height="200" rx="20" fill="#0F172A"/>
  <text x="40" y="60" fill="#FFFFFF" font-size="18" font-weight="bold">💥 Explosion Risk</text>
  <text x="40" y="90" fill="#CBD5F5" font-size="14">
    Pressurized cylinders (CNG, LPG) can detonate during shredding.
  </text>
  <text x="40" y="110" fill="#CBD5F5" font-size="14">
    Even one undetected cylinder can cause catastrophic damage.
  </text>

  <!-- Card 2 -->
  <rect x="520" y="20" width="450" height="200" rx="20" fill="#0F172A"/>
  <text x="540" y="60" fill="#FFFFFF" font-size="18" font-weight="bold">⚠️ Manual Sorting Failures</text>
  <text x="540" y="90" fill="#CBD5F5" font-size="14">
    Conveyor speeds (1–3 m/s) reduce human accuracy.
  </text>
  <text x="540" y="110" fill="#CBD5F5" font-size="14">
    15–25% hazardous items are missed due to fatigue & visibility.
  </text>

  <!-- Card 3 -->
  <rect x="20" y="260" width="450" height="200" rx="20" fill="#0F172A"/>
  <text x="40" y="300" fill="#FFFFFF" font-size="18" font-weight="bold">🌍 Environmental Contamination</text>
  <text x="40" y="330" fill="#CBD5F5" font-size="14">
    Shock absorbers leak toxic hydraulic fluids.
  </text>
  <text x="40" y="350" fill="#CBD5F5" font-size="14">
    Leads to soil and groundwater pollution.
  </text>

  <!-- Card 4 -->
  <rect x="520" y="260" width="450" height="200" rx="20" fill="#0F172A"/>
  <text x="540" y="300" fill="#FFFFFF" font-size="18" font-weight="bold">🤖 Our Solution</text>
  <text x="540" y="330" fill="#CBD5F5" font-size="14">
    Real-time detection using YOLOv8 and FastAPI.
  </text>
  <text x="540" y="350" fill="#CBD5F5" font-size="14">
    Web dashboard for monitoring and alerts.
  </text>

</svg>
