<svg width="100%" height="500" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Card 1 -->
  <rect x="20" y="20" width="450" height="200" rx="20" fill="#0F172A"/>
  <circle cx="50" cy="50" r="8" fill="#FF4D4D"/>
  <text x="70" y="55" fill="#FFFFFF" font-size="18" font-weight="bold">Explosion Risk</text>
  <text x="40" y="90" fill="#CBD5F5" font-size="14">
    <tspan x="40" dy="0">Pressurized cylinders can detonate</tspan>
    <tspan x="40" dy="18">during shredding operations.</tspan>
    <tspan x="40" dy="18">Even one missed → catastrophic damage.</tspan>
  </text>

  <!-- Card 2 -->
  <rect x="520" y="20" width="450" height="200" rx="20" fill="#0F172A"/>
  <polygon points="540,45 550,65 530,65" fill="#FFC107"/>
  <text x="570" y="55" fill="#FFFFFF" font-size="18" font-weight="bold">Manual Sorting Failures</text>
  <text x="540" y="90" fill="#CBD5F5" font-size="14">
    <tspan x="540" dy="0">High conveyor speed reduces accuracy.</tspan>
    <tspan x="540" dy="18">15–25% hazardous items are missed.</tspan>
  </text>

  <!-- Card 3 -->
  <rect x="20" y="260" width="450" height="200" rx="20" fill="#0F172A"/>
  <circle cx="50" cy="290" r="10" fill="#4CAF50"/>
  <text x="70" y="295" fill="#FFFFFF" font-size="18" font-weight="bold">Environmental Contamination</text>
  <text x="40" y="330" fill="#CBD5F5" font-size="14">
    <tspan x="40" dy="0">Hydraulic oil leaks contaminate soil</tspan>
    <tspan x="40" dy="18">and groundwater resources.</tspan>
  </text>

  <!-- Card 4 -->
  <rect x="520" y="260" width="450" height="200" rx="20" fill="#0F172A"/>
  <rect x="535" y="275" width="20" height="20" fill="#6366F1"/>
  <text x="570" y="295" fill="#FFFFFF" font-size="18" font-weight="bold">Our Solution</text>
  <text x="540" y="330" fill="#CBD5F5" font-size="14">
    <tspan x="540" dy="0">YOLOv8 real-time detection system</tspan>
    <tspan x="540" dy="18">with FastAPI dashboard.</tspan>
  </text>

</svg>
