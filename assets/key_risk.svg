<svg width="100%" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">

  <!-- White Background -->
  <rect width="100%" height="100%" fill="#FFFFFF"/>

  <defs>
    <style>
      .card { fill:#0F172A; }
      .title { fill:#E2E8F0; font-size:18px; font-weight:600; font-family:Inter, sans-serif;}
      .desc { fill:#94A3B8; font-size:13px; font-family:Inter, sans-serif;}
    </style>
  </defs>

  <!-- Card 1 -->
  <rect x="30" y="20" width="440" height="150" rx="18" class="card"/>
  <circle cx="55" cy="50" r="7" fill="#FF4D4D"/>
  <text x="75" y="55" class="title">Explosion Risk</text>
  <text x="45" y="85" class="desc">
    <tspan x="45" dy="0">Pressurized cylinders can detonate during shredding.</tspan>
    <tspan x="45" dy="16">Even one missed → catastrophic damage.</tspan>
  </text>

  <!-- Card 2 -->
  <rect x="530" y="20" width="440" height="150" rx="18" class="card"/>
  <polygon points="555,45 565,65 545,65" fill="#FACC15"/>
  <text x="585" y="55" class="title">Manual Sorting Failures</text>
  <text x="545" y="85" class="desc">
    <tspan x="545" dy="0">High conveyor speed reduces accuracy.</tspan>
    <tspan x="545" dy="16">15–25% hazardous items are missed.</tspan>
  </text>

  <!-- Card 3 -->
  <rect x="30" y="200" width="440" height="150" rx="18" class="card"/>
  <circle cx="55" cy="230" r="8" fill="#22C55E"/>
  <text x="75" y="235" class="title">Environmental Contamination</text>
  <text x="45" y="265" class="desc">
    <tspan x="45" dy="0">Hydraulic oil leaks contaminate soil</tspan>
    <tspan x="45" dy="16">and groundwater resources.</tspan>
  </text>

  <!-- Card 4 -->
  <rect x="530" y="200" width="440" height="150" rx="18" class="card"/>
  <rect x="550" y="220" width="16" height="16" fill="#6366F1"/>
  <text x="585" y="235" class="title">Our Solution</text>
  <text x="545" y="265" class="desc">
    <tspan x="545" dy="0">YOLOv8 real-time detection system</tspan>
    <tspan x="545" dy="16">with FastAPI dashboard.</tspan>
  </text>

</svg>
